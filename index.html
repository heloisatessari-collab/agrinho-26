<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 | Agro Forte, Futuro Sustentável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-emerald-800 text-white fixed w-full z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-seedling text-4xl"></i>
                <h1 class="text-3xl font-bold tracking-tight">AGRINHO 2026</h1>
            </div>
            <div class="hidden md:flex gap-10 text-lg font-medium">
                <a href="#inicio" class="hover:text-emerald-300 transition">Início</a>
                <a href="#sustentabilidade" class="hover:text-emerald-300 transition">Sustentabilidade</a>
                <a href="#galeria" class="hover:text-emerald-300 transition">Galeria</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="inicio" class="hero-bg h-screen flex items-center text-white relative">
        <div class="max-w-7xl mx-auto px-6 text-center z-10">
            <h1 class="text-6xl md:text-7xl font-black mb-6 leading-tight">
                AGRO FORTE,<br>
                <span class="text-emerald-300">FUTURO SUSTENTÁVEL</span>
            </h1>
            <p class="text-2xl md:text-3xl max-w-3xl mx-auto mb-10">
                Como conciliar alta produtividade com a preservação do planeta
            </p>
        </div>
    </section>

    <!-- Sustentabilidade com Imagem 1 -->
    <section id="sustentabilidade" class="py-24 bg-emerald-50">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-bold text-center mb-16 text-emerald-800">Tecnologias Sustentáveis</h2>
            <div class="grid md:grid-cols-2 gap-16 items-center">
                <div class="space-y-8">
                    <div class="bg-white p-8 rounded-3xl shadow">
                        <h3 class="text-2xl font-bold mb-3">Agricultura de Precisão</h3>
                        <p class="text-gray-600">Sensores e IA ajudam o produtor a usar menos recursos.</p>
                    </div>
                </div>
                <img src="assets/agrinho-personagem.jpg" 
                     alt="Agrinho" 
                     class="rounded-3xl shadow-2xl w-full">
            </div>
        </div>
    </section>

    <!-- Galeria com Imagem 2 -->
    <section id="galeria" class="py-24 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-5xl font-bold text-center mb-16 text-emerald-800">Agrinho em Ação</h2>
            <div class="grid md:grid-cols-2 gap-10">
                <div class="text-center">
                    <img src="assets/agrinho-plantando.jpg" 
                         alt="Agrinho plantando" 
                         class="rounded-3xl shadow-2xl mb-6 w-full">
                    <p class="font-bold text-xl text-emerald-700">Plantando o Futuro!</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
